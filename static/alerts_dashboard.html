<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alerts Dashboard</title>
<style>
 body {
   font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
   margin: 20px;
   background-color: #f5f5f5;
 }
 h2 {
   color: #333;
   margin-bottom: 20px;
 }
.container {
   background: white;
   padding: 20px;
   border-radius: 8px;
   box-shadow: 0 2px 8px rgba(0,0,0,0.1);
 }
 table {
   border-collapse: collapse;
   width: 100%;
 }
 th, td {
   border: 1px solid #ddd;
   padding: 12px 8px;
   text-align: left;
   vertical-align: top;
 }
 th {
   background-color: #f8f9fa;
   font-weight: 600;
   position: sticky;
   top: 0;
 }
 tr:nth-child(even) { background-color: #f9f9f9; }
 tr:hover { background-color: #f1f1f1; }
 /* Severity badges */
.severity-badge {
   padding: 4px 10px;
   border-radius: 12px;
   font-weight: 600;
   font-size: 12px;
   display: inline-block;
   text-transform: uppercase;
 }
.severity-critical {
   background-color: #f8d7da;
   color: #721c24;
   border: 1px solid #f5c6cb;
 }
.severity-warning {
   background-color: #fff3cd;
   color: #856404;
   border: 1px solid #ffeaa7;
 }
.severity-info {
   background-color: #d1ecf1;
   color: #0c5460;
   border: 1px solid #bee5eb;
 }
 /* Data lists */
.data-list {
   margin: 0;
   padding-left: 20px;
 }
.data-list li {
   margin-bottom: 8px;
   line-height: 1.5;
 }
.data-list li:last-child {
   margin-bottom: 0;
 }
.no-data {
   color: #6c757d;
   font-style: italic;
 }
.refresh-info {
   text-align: right;
   font-size: 12px;
   color: #6c757d;
   margin-bottom: 10px;
 }
</style>
</head>
<body>
<div class="container">
<h2>Alerts Dashboard</h2>
<div class="refresh-info">Auto-refreshes every 10 seconds</div>
<table>
<thead>
<tr>
<th>Alert Type</th>
<th>Severity</th>
<th>Root Causes (Analyzer)</th>
<th>Resolver & Manual Steps</th>
</tr>
</thead>
<tbody id="alerts-body">
<tr><td colspan="4" style="text-align: center;">Loading...</td></tr>
</tbody>
</table>
</div>
<script>
function getSeverityClass(severity) {
 if (!severity) return 'severity-info';
 const s = severity.toLowerCase();
 if (s === 'critical' || s === 'high') return 'severity-critical';
 if (s === 'warning' || s === 'medium') return 'severity-warning';
 return 'severity-info';
}
function formatAlertType(text) {
 if (!text) return '-';
 return text.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
}
function parseSteps(stepsData) {
 let steps = stepsData || [];
 // Case 1: Backend sends one long string "1. step one. 2. step two."
 if (typeof steps === 'string') {
   steps = steps.split(/\d+\.\s+/).filter(s => s.trim().length > 0);
 }
 // Case 2: Backend sends array with one element containing all steps
 if (Array.isArray(steps) && steps.length === 1 && /\d+\.\s+/.test(steps[0])) {
   steps = steps[0].split(/\d+\.\s+/).filter(s => s.trim().length > 0);
 }
 // Case 3: Backend sends string with newlines
 if (Array.isArray(steps) && steps.length === 1 && steps[0].includes('\n')) {
   steps = steps[0].split('\n').filter(s => s.trim().length > 0);
 }
 return Array.isArray(steps)? steps.map(s => s.trim()) : [];
}
async function fetchAlerts() {
 try {
   const response = await fetch('/alerts');
   if (!response.ok) throw new Error(`HTTP ${response.status}`);
   const alerts = await response.json();
   const tbody = document.getElementById('alerts-body');
   if (alerts.length === 0) {
     tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No alerts found</td></tr>';
     return;
   }
   tbody.innerHTML = '';
   alerts.forEach(alert => {
     const tr = document.createElement('tr');
     // 1. Alert Type
     const tdAlertType = document.createElement('td');
     tdAlertType.textContent = formatAlertType(alert.alert_type || alert.issue);
     tr.appendChild(tdAlertType);
     // 2. Severity with color badge
     const tdSeverity = document.createElement('td');
     const severitySpan = document.createElement('span');
     severitySpan.className = `severity-badge ${getSeverityClass(alert.severity)}`;
     severitySpan.textContent = alert.severity || '-';
     tdSeverity.appendChild(severitySpan);
     tr.appendChild(tdSeverity);
     // 3. Root Causes - full list
     const tdRootCauses = document.createElement('td');
     if (alert.root_causes && alert.root_causes.length > 0) {
       const ul = document.createElement('ul');
       ul.className = 'data-list';
       alert.root_causes.forEach(rc => {
         const li = document.createElement('li');
         li.textContent = rc;
         ul.appendChild(li);
       });
       tdRootCauses.appendChild(ul);
     } else {
       tdRootCauses.innerHTML = '<span class="no-data">None</span>';
     }
     tr.appendChild(tdRootCauses);
     // 4. Resolver manual steps - FIXED for bad backend data
     const tdResolver = document.createElement('td');
     const steps = parseSteps(alert.resolver?.manual_steps || alert.resolver?.resolutions);
     if (steps.length > 0) {
       const ol = document.createElement('ol');
       ol.className = 'data-list';
       steps.forEach(step => {
         const li = document.createElement('li');
         li.textContent = step;
         ol.appendChild(li);
       });
       tdResolver.appendChild(ol);
     } else {
       tdResolver.innerHTML = '<span class="no-data">Auto Resolved</span>';
     }
     tr.appendChild(tdResolver);
     tbody.appendChild(tr);
   });
 } catch (error) {
   console.error('Error fetching alerts:', error);
   const tbody = document.getElementById('alerts-body');
   tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: red;">Error loading alerts: ${error.message}</td></tr>`;
 }
}
// Fetch alerts on page load + refresh every 10s
fetchAlerts();
setInterval(fetchAlerts, 10000);
</script>
</body>
</html>
