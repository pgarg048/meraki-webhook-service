<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Alerts Dashboard</title>
<style>
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
  th { background-color: #f2f2f2; }
  .tooltip {
    position: relative;
    display: inline-block;
    cursor: pointer;
    color: blue;
    text-decoration: underline;
  }
  .tooltip .tooltiptext {
    visibility: hidden;
    width: 300px;
    background-color: #eee;
    color: #000;
    text-align: left;
    border-radius: 6px;
    padding: 10px;
    position: absolute;
    z-index: 1;
    bottom: 125%; left: 50%; margin-left: -150px;
    box-shadow: 0px 0px 10px #aaa;
  }
  .tooltip:hover .tooltiptext {
    visibility: visible;
  }
</style>
</head>
<body>
<h2>Alerts Dashboard</h2>
<table>
  <thead>
    <tr>
      <th>Device Name</th>
      <th>Alert Type</th>
      <th>Severity</th>
      <th>Root Causes (Analyzer)</th>
      <th>Resolver & Manual Steps</th>
    </tr>
  </thead>
  <tbody id="alerts-body">
    <!-- Rows will be populated here -->
  </tbody>
</table>

<script>
async function fetchAlerts() {
  try {
    const response = await fetch('/alerts');
    const alerts = await response.json();
    const tbody = document.getElementById('alerts-body');
    tbody.innerHTML = '';

    alerts.forEach(alert => {
      const tr = document.createElement('tr');

      // Alert Type
      const tdAlertType = document.createElement('td');
      tdAlertType.textContent = alert.alert_type || '-';
      tr.appendChild(tdAlertType);

      // Severity
      const tdSeverity = document.createElement('td');
      tdSeverity.textContent = alert.severity || '-';
      tr.appendChild(tdSeverity);

      // Root Causes with tooltip
      const tdRootCauses = document.createElement('td');
      if (alert.root_causes && alert.root_causes.length > 0) {
        const span = document.createElement('span');
        span.className = 'tooltip';
        span.textContent = 'View Root Causes';
        const tooltipText = document.createElement('div');
        tooltipText.className = 'tooltiptext';
        tooltipText.innerHTML = alert.root_causes.map(rc => `<li>${rc}</li>`).join('');
        span.appendChild(tooltipText);
        tdRootCauses.appendChild(span);
      } else {
        tdRootCauses.textContent = 'None';
      }
      tr.appendChild(tdRootCauses);

      // Resolver manual steps with tooltip
      const tdResolver = document.createElement('td');
      if (alert.resolver && alert.resolver.manual_steps && alert.resolver.manual_steps.length > 0) {
        const span = document.createElement('span');
        span.className = 'tooltip';
        span.textContent = 'View Manual Steps';
        const tooltipText = document.createElement('div');
        tooltipText.className = 'tooltiptext';
        tooltipText.innerHTML = alert.resolver.manual_steps.map(step => `<p>${step.replace(/\n/g, '<br>')}</p>`).join('');
        span.appendChild(tooltipText);
        tdResolver.appendChild(span);
      } else {
        tdResolver.textContent = 'Auto Resolved';
      }
      tr.appendChild(tdResolver);

      tbody.appendChild(tr);
    });
  } catch (error) {
    console.error('Error fetching alerts:', error);
  }
}

// Fetch alerts on page load
fetchAlerts();
</script>
</body>
</html>
